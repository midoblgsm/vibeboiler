name: Build & Submit iOS

on:
  push:
    branches: [main]
    paths:
      - "apps/mobile/**"
      - "packages/shared/**"
  workflow_dispatch:

jobs:
  build:
    name: EAS Build iOS
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm
      - run: pnpm install --frozen-lockfile

      - name: Setup Expo
        uses: expo/expo-github-action@v8
        with:
          eas-version: latest
          token: ${{ secrets.EXPO_TOKEN }}

      - name: Set EAS project ID
        working-directory: apps/mobile
        run: |
          jq '.expo.extra.eas.projectId = "${{ secrets.EAS_PROJECT_ID }}"' app.json > app.json.tmp && mv app.json.tmp app.json

      - name: Build iOS
        working-directory: apps/mobile
        run: eas build --platform ios --profile production --non-interactive
        env:
          EXPO_PUBLIC_FIREBASE_API_KEY: ${{ secrets.FIREBASE_API_KEY }}

      - name: Submit to App Store
        working-directory: apps/mobile
        run: eas submit --platform ios --profile production --non-interactive
        env:
          EXPO_APPLE_ID: ${{ secrets.APPLE_ID }}
          EXPO_APPLE_APP_SPECIFIC_PASSWORD: ${{ secrets.APPLE_APP_SPECIFIC_PASSWORD }}
