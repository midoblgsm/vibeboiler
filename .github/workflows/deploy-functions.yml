name: Deploy Functions

on:
  push:
    branches: [main]
    paths:
      - "functions/**"
  pull_request:
    branches: [main]
    paths:
      - "functions/**"
  workflow_dispatch:

jobs:
  deploy-functions:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - name: Build Functions
        run: pnpm --filter @vibeboiler/functions build

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.FIREBASE_SERVICE_ACCOUNT }}

      - name: Set Cloud Functions secrets
        if: github.event_name != 'pull_request'
        run: |
          echo "${{ secrets.NEON_DATABASE_URL }}" | npx firebase-tools functions:secrets:set NEON_DATABASE_URL --data-file=- --project ${{ secrets.FIREBASE_PROJECT_ID }}

      - name: Set Artifact Registry cleanup policy
        if: github.event_name != 'pull_request'
        run: |
          cat > /tmp/cleanup-policy.json << 'EOF'
          [
            {
              "id": "delete-old-images",
              "action": { "type": "Delete" },
              "condition": { "olderThan": "604800s" }
            }
          ]
          EOF
          gcloud artifacts repositories set-cleanup-policies gcf-artifacts \
            --project=${{ secrets.FIREBASE_PROJECT_ID }} \
            --location=us-central1 \
            --policy=/tmp/cleanup-policy.json \
            --no-dry-run

      - name: Deploy to Firebase Functions
        if: github.event_name != 'pull_request'
        run: npx firebase-tools deploy --only functions --project ${{ secrets.FIREBASE_PROJECT_ID }}
