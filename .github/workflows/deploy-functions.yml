name: Deploy Functions

on:
  push:
    branches: [main]
    paths:
      - "functions/**"
  pull_request:
    branches: [main]
    paths:
      - "functions/**"
  workflow_dispatch:

jobs:
  deploy-functions:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - name: Build Functions
        run: pnpm --filter @vibeboiler/functions build

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.FIREBASE_SERVICE_ACCOUNT }}

      - name: Set Cloud Functions secrets
        if: github.event_name != 'pull_request'
        run: |
          for SECRET_NAME in NEON_DATABASE_URL; do
            VALUE_VAR="SECRET_${SECRET_NAME}"
            echo -n "${!VALUE_VAR}" | gcloud secrets create "$SECRET_NAME" --data-file=- --project=${{ secrets.FIREBASE_PROJECT_ID }} 2>/dev/null || \
            echo -n "${!VALUE_VAR}" | gcloud secrets versions add "$SECRET_NAME" --data-file=- --project=${{ secrets.FIREBASE_PROJECT_ID }}
          done
        env:
          SECRET_NEON_DATABASE_URL: ${{ secrets.NEON_DATABASE_URL }}

      - name: Deploy to Firebase Functions
        if: github.event_name != 'pull_request'
        run: npx firebase-tools deploy --only functions --project ${{ secrets.FIREBASE_PROJECT_ID }}
