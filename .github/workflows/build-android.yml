name: Build & Submit Android

on:
  push:
    branches: [main]
    paths:
      - "apps/mobile/**"
      - "packages/shared/**"
  workflow_dispatch:

jobs:
  build:
    name: EAS Build Android
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install --frozen-lockfile

      - name: Setup Expo
        uses: expo/expo-github-action@v8
        with:
          eas-version: latest
          token: ${{ secrets.EXPO_TOKEN }}

      - name: Configure app for build
        working-directory: apps/mobile
        run: |
          jq '
            .expo.extra.eas.projectId = "${{ secrets.EAS_PROJECT_ID }}" |
            .expo.ios.bundleIdentifier = "${{ secrets.IOS_BUNDLE_IDENTIFIER }}" |
            .expo.android.package = "${{ secrets.ANDROID_PACKAGE_NAME }}"
          ' app.json > app.json.tmp && mv app.json.tmp app.json

          echo '${{ secrets.GOOGLE_PLAY_SERVICE_ACCOUNT_KEY }}' > google-play-service-account.json

      - name: Build Android
        working-directory: apps/mobile
        run: eas build --platform android --profile production --non-interactive
        env:
          EXPO_PUBLIC_FIREBASE_API_KEY: ${{ secrets.FIREBASE_API_KEY }}

      - name: Submit to Play Store
        working-directory: apps/mobile
        run: eas submit --platform android --profile production --non-interactive
